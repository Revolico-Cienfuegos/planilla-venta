<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas Cienfuegos</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-badge">VC</div>
      <div>
        <div class="logo-nombre">Ventas Cienfuegos</div>
        <div class="logo-sub">Tienda online</div>
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <h1>Todo lo que buscas,<br><span>en un solo lugar</span></h1>
  <p>Explora nuestro catálogo y pide directo por WhatsApp. Rápido y fácil.</p>
  <div class="hero-badge"><span class="dot"></span> Pedidos por WhatsApp</div>
</section>

<!-- BUSCADOR -->
<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Buscar en todos los productos..." autocomplete="off">
    <button id="clearSearch" style="display:none;background:transparent;color:var(--suave);font-size:18px;">✕</button>
    <button>🔍</button>
  </div>
  <div class="search-results-label" id="searchLabel" style="display:none;"></div>
</div>

<main class="main">
  <!-- FILTRO POR CATEGORÍAS -->
  <div class="cats-scroll" id="catsNav" style="display:none;">
    <div class="cats-inner" id="catsInner"></div>
  </div>

  <!-- SKELETONS mientras carga -->
  <div id="skeletons">
    <div class="seccion">
      <div class="skel" style="height:18px;width:180px;margin-bottom:14px;border-radius:6px;"></div>
      <div class="grid">
        <div class="skel" style="height:220px;"></div>
        <div class="skel" style="height:220px;"></div>
        <div class="skel" style="height:220px;"></div>
      </div>
    </div>
  </div>

  <!-- CONTENIDO REAL -->
  <div id="contenido" style="display:none;"></div>

  <!-- RESULTADOS BÚSQUEDA -->
  <div id="resultadosBusqueda" style="display:none;"></div>

  <!-- VACÍO -->
  <div id="vacio" class="empty" style="display:none;">
    <div class="ico">🛍️</div>
    <div>Todavía no hay productos publicados.</div>
  </div>
</main>

<footer class="site-footer">
  <strong>Ventas Cienfuegos</strong> · Pedidos por WhatsApp · Cuba 🇨🇺
</footer>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <button class="modal-cerrar" id="modalCerrar">✕</button>
    <div id="mImgWrap"></div>
    <div class="modal-body">
      <div class="modal-tag" id="mTag"></div>
      <h2 class="modal-nombre" id="mNombre"></h2>
      <div class="modal-precio" id="mPrecio"></div>
      <p class="modal-desc" id="mDesc"></p>
      <button class="modal-pedir" id="mPedir">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.85L.057 23.5l5.797-1.52A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.85 0-3.583-.497-5.073-1.365l-.363-.215-3.44.902.917-3.349-.236-.375A9.957 9.957 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
        Pedir por WhatsApp
      </button>
    </div>
  </div>
</div>

<script>
const WA = "5354571729";

const CATEGORIAS = [
  { id:"electricidad",    nombre:"Electricidad y Protección",            ico:"⚡" },
  { id:"solar",           nombre:"Energía Solar y Respaldo",             ico:"☀️" },
  { id:"moviles",         nombre:"Dispositivos Móviles y Carga Portátil",ico:"📱" },
  { id:"electrodomesticos",nombre:"Electrodomésticos y Cocina",          ico:"🍳" },
  { id:"audio",           nombre:"Audio y Televisión",                   ico:"📺" },
  { id:"iluminacion",     nombre:"Iluminación",                          ico:"💡" },
  { id:"herramientas",    nombre:"Herramientas",                         ico:"🔧" },
  { id:"automotriz",      nombre:"Automotriz y Medición",                ico:"🚗" },
  { id:"miscelaneos",     nombre:"Misceláneos y Hogar",                  ico:"🏠" },
  { id:"planillas",       nombre:"Planillas de Venta",                   ico:"📋" },
];

const WA_ICO = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.85L.057 23.5l5.797-1.52A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.85 0-3.583-.497-5.073-1.365l-.363-.215-3.44.902.917-3.349-.236-.375A9.957 9.957 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;

let DATA = [];
let catActiva = "todas";

function isMobile(){ return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }
function openWA(msg){
  const enc = encodeURIComponent(msg);
  const url = isMobile() ? `whatsapp://send?phone=${WA}&text=${enc}` : `https://web.whatsapp.com/send?phone=${WA}&text=${enc}`;
  if(isMobile()){
    const fb = `https://api.whatsapp.com/send?phone=${WA}&text=${enc}`;
    const t = setTimeout(()=>{ window.location.href=fb; },1500);
    window.addEventListener("blur",()=>clearTimeout(t),{once:true});
    window.location.href=url;
  } else { window.open(url,"_blank"); }
}
function fmt(p,m){ return p?`${p} ${m||""}`.trim():""; }
function nombreCat(id){ return CATEGORIAS.find(c=>c.id===id)?.nombre||id; }
function icoCat(id){ return CATEGORIAS.find(c=>c.id===id)?.ico||"📦"; }

function pedirProducto(p){
  const lines=["🛍️ PEDIDO - Ventas Cienfuegos","",`📦 Producto: ${p.nombre}`];
  if(p.precio) lines.push(`💵 Precio: ${fmt(p.precio,p.moneda)}`);
  if(p.categoria) lines.push(`🗂️ Categoría: ${nombreCat(p.categoria)}`);
  if(p.descripcion) lines.push(`📝 Descripción: ${p.descripcion}`);
  lines.push("","Hola, me interesa este producto. ¿Está disponible?");
  openWA(lines.join("\n"));
}

function cardHTML(p,idx,mostrarTag=false){
  const tag = mostrarTag ? `<div class="card-cat-tag">${icoCat(p.categoria)} ${nombreCat(p.categoria)}</div>` : "";
  const img = p.imagen
    ? `<img class="card-img" src="${p.imagen}" alt="${p.nombre}" loading="lazy" decoding="async" data-idx="${idx}">`
    : `<div class="card-img-ph" data-idx="${idx}"><span style="font-size:30px;opacity:.3;">🖼️</span></div>`;
  const precio = p.precio ? `<div class="card-precio">${fmt(p.precio,p.moneda)}</div>` : "";
  return `<article class="card">
    ${img}${tag}
    <div class="card-body">
      <div class="card-nombre" data-idx="${idx}">${p.nombre}</div>
      ${precio}
      <button class="card-pedir" data-idx="${idx}" data-action="pedir">${WA_ICO} Pedir</button>
    </div>
  </article>`;
}

function bindCards(container){
  container.querySelectorAll("[data-idx]:not([data-action])").forEach(el=>{
    el.addEventListener("click",()=>abrirModal(DATA[+el.dataset.idx]));
  });
  container.querySelectorAll("[data-action='pedir']").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();pedirProducto(DATA[+btn.dataset.idx]);});
  });
}

function renderCatalogo(filtro=null){
  const contenido = document.getElementById("contenido");
  const vacio = document.getElementById("vacio");
  document.getElementById("skeletons").style.display="none";
  document.getElementById("resultadosBusqueda").style.display="none";

  const datos = filtro!==null ? DATA.filter(p=>p.categoria===filtro) : DATA;
  if(!datos.length){
    vacio.style.display="block"; contenido.style.display="none";
    vacio.innerHTML = filtro!==null
      ? `<div class="ico">${icoCat(filtro)}</div><div>Todavía no hay productos en "${nombreCat(filtro)}".</div>`
      : `<div class="ico">🛍️</div><div>Todavía no hay productos publicados.</div>`;
    return;
  }
  vacio.style.display="none"; contenido.style.display="block";

  const porCat = {};
  datos.forEach((p,i)=>{
    const cat = p.categoria||"miscelaneos";
    if(!porCat[cat]) porCat[cat]=[];
    porCat[cat].push({p, idx: DATA.indexOf(p)});
  });

  const orden = CATEGORIAS.map(c=>c.id).filter(id=>porCat[id]);
  contenido.innerHTML = orden.map(catId=>{
    const cat = CATEGORIAS.find(c=>c.id===catId);
    const items = porCat[catId];
    return `<section class="seccion" id="cat-${catId}">
      <div class="seccion-header">
        <span class="seccion-ico">${cat.ico}</span>
        <span class="seccion-titulo">${cat.nombre}</span>
        <div class="seccion-linea"></div>
      </div>
      <div class="grid">${items.map(({p,idx})=>cardHTML(p,idx,false)).join("")}</div>
    </section>`;
  }).join("");

  bindCards(contenido);
}

function renderBusqueda(q){
  const rb = document.getElementById("resultadosBusqueda");
  const contenido = document.getElementById("contenido");
  const label = document.getElementById("searchLabel");
  contenido.style.display="none";
  document.getElementById("vacio").style.display="none";

  const ql = q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const res = DATA.map((p,idx)=>({p,idx})).filter(({p})=>{
    const hay = `${p.nombre} ${p.descripcion||""} ${nombreCat(p.categoria)}`.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    return hay.includes(ql);
  });

  label.style.display="block";
  label.textContent = res.length ? `${res.length} resultado${res.length!==1?"s":""} para "${q}"` : `Sin resultados para "${q}"`;

  if(!res.length){
    rb.style.display="block";
    rb.innerHTML=`<div class="empty"><div class="ico">🔍</div><div>No encontramos productos con ese nombre.</div></div>`;
    return;
  }
  rb.style.display="block";
  rb.innerHTML=`<div class="grid">${res.map(({p,idx})=>cardHTML(p,idx,true)).join("")}</div>`;
  bindCards(rb);
}

function buildCatsNav(){
  const nav = document.getElementById("catsNav");
  const inner = document.getElementById("catsInner");
  nav.style.display="block";

  inner.innerHTML = `<button class="cat-btn active" data-cat="todas">🏪 Todo</button>` +
    CATEGORIAS.map(c=>`<button class="cat-btn" data-cat="${c.id}"><span class="cat-ico">${c.ico}</span>${c.nombre}</button>`).join("");

  inner.querySelectorAll(".cat-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      inner.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      catActiva = btn.dataset.cat;
      limpiarBusqueda();
      if(catActiva==="todas") renderCatalogo();
      else {
        renderCatalogo(catActiva);
        const sec = document.getElementById(`cat-${catActiva}`);
        if(sec) sec.scrollIntoView({behavior:"smooth",block:"start"});
      }
    });
  });
}

// BÚSQUEDA
let searchTimer = null;
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearSearch");

searchInput.addEventListener("input", ()=>{
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  clearBtn.style.display = q ? "flex" : "none";
  if(!q){ limpiarBusqueda(); return; }
  searchTimer = setTimeout(()=>renderBusqueda(q), 280);
});

clearBtn.addEventListener("click", ()=>{ searchInput.value=""; limpiarBusqueda(); searchInput.focus(); });

function limpiarBusqueda(){
  clearBtn.style.display="none";
  document.getElementById("searchLabel").style.display="none";
  document.getElementById("resultadosBusqueda").style.display="none";
  if(catActiva==="todas") renderCatalogo();
  else renderCatalogo(catActiva);
}

// MODAL
function abrirModal(p){
  document.getElementById("mTag").textContent = `${icoCat(p.categoria)} ${nombreCat(p.categoria)}`;
  document.getElementById("mNombre").textContent = p.nombre;
  document.getElementById("mPrecio").textContent = fmt(p.precio,p.moneda);
  document.getElementById("mDesc").textContent = p.descripcion||"";
  document.getElementById("mImgWrap").innerHTML = p.imagen
    ? `<img class="modal-img" src="${p.imagen}" alt="${p.nombre}" loading="lazy">`
    : `<div class="modal-img-ph">🖼️</div>`;
  document.getElementById("mPedir").onclick = ()=>pedirProducto(p);
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function cerrarModal(){
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow="";
}
document.getElementById("modalCerrar").addEventListener("click",cerrarModal);
document.getElementById("overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") cerrarModal(); });
let ty=0;
document.getElementById("modal").addEventListener("touchstart",e=>{ty=e.touches[0].clientY;},{passive:true});
document.getElementById("modal").addEventListener("touchmove",e=>{ if(e.touches[0].clientY-ty>60) cerrarModal(); },{passive:true});

// CARGA
fetch("productos.json?_="+Date.now())
  .then(r=>r.json())
  .then(data=>{
    DATA = Array.isArray(data)?data:[];
    buildCatsNav();
    renderCatalogo();
  })
  .catch(()=>{
    document.getElementById("skeletons").style.display="none";
    document.getElementById("vacio").style.display="block";
    document.getElementById("vacio").innerHTML='<div class="ico">⚠️</div><div>No se pudieron cargar los productos.<br>Verifica tu conexión.</div>';
  });

if("serviceWorker" in navigator)
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
</script>
</body>
</html>
